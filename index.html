<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Montana Solitaire</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link data-trunk rel="rust" data-target-name="montana_solitaire" />
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }

      #app {
        min-height: 100vh;
      }

      .loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div id="app" class="loading">
      <div>
        <h1>Montana Solitaire</h1>
        <p>Loading the game…</p>
      </div>
    </div>

    <script type="module">
      import init from './pkg/montana_solitaire.js';

      init().catch((error) => {
        console.error(error);
        document.getElementById('app').innerHTML = '<div class="loading"><div><h1>Montana Solitaire</h1><p>Failed to load the game. Please refresh the page.</p></div></div>';
      });

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(console.error);
        });
      }
    </script>
  </body>
</html>
